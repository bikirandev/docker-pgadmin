services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'True'
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'True'
      PGADMIN_CONFIG_SESSION_COOKIE_SAMESITE: "'Strict'"
      PGADMIN_CONFIG_SESSION_COOKIE_SECURE: 'False'  # Set to 'True' if using HTTPS
      PGADMIN_CONFIG_WTF_CSRF_ENABLED:  'True'
      PGADMIN_CONFIG_WTF_CSRF_TIME_LIMIT: 'None'
    ports:
      - "127.0.0.1:${PGADMIN_PORT}:80"  # Only bind to localhost
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    user: root  # Required for proper permissions

volumes:
  pgadmin_data:
    driver: local